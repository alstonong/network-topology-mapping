name: homelab
prefix: clab

topology:
  nodes:
    firewall: { kind: linux, image: alpine:latest, exec: ["apk add iptables iproute2"] 
}
    router-a: { kind: linux, image: alpine:latest, exec: ["apk add iproute2"] }
    router-b: { kind: linux, image: alpine:latest, exec: ["apk add iproute2"] }
    
    switch-a: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 bridge-utils"] }
    switch-b: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 bridge-utils"] }

    # Subnet A (192.168.10.0/24)
    linux-a1: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 nmap nmap-scripts tcpdump openssh"] }
    linux-a2: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 openssh"] }
    win-a1: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 samba socat"] }
    win-a2: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 samba socat"] }
    web-server-a: { kind: linux, image: nginx:alpine, exec: ["apk add iproute2"] }

    # Subnet B (192.168.20.0/24)
    linux-b1: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 openssh"] }
    linux-b2: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 openssh"] }
    win-b1: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 samba socat"] }
    win-b2: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 samba socat"] }
    file-server-b: { kind: linux, image: alpine:latest, exec: ["apk add iproute2 samba vsftpd"] }
    db-server: { kind: linux, image: postgres:alpine, env: { POSTGRES_PASSWORD: "admin" }, exec: ["apk add iproute2"] }

  links:
    - endpoints: ["firewall:eth1", "router-a:eth1"]
    - endpoints: ["firewall:eth2", "router-b:eth1"]
    - endpoints: ["router-a:eth2", "switch-a:eth1"]
    - endpoints: ["router-b:eth2", "switch-b:eth1"]
    
    # Subnet A Links
    - endpoints: ["switch-a:eth2", "linux-a1:eth1"]
    - endpoints: ["switch-a:eth3", "linux-a2:eth1"]
    - endpoints: ["switch-a:eth4", "win-a1:eth1"]
    - endpoints: ["switch-a:eth5", "win-a2:eth1"]
    - endpoints: ["switch-a:eth6", "web-server-a:eth1"]
    
    # Subnet B Links
    - endpoints: ["switch-b:eth2", "linux-b1:eth1"]
    - endpoints: ["switch-b:eth3", "linux-b2:eth1"]
    - endpoints: ["switch-b:eth4", "win-b1:eth1"]
    - endpoints: ["switch-b:eth5", "win-b2:eth1"]
    - endpoints: ["switch-b:eth6", "file-server-b:eth1"]
    - endpoints: ["switch-b:eth7", "db-server:eth1"]

